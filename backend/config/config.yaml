# ============================================================
# Context-Aware Retrieval Engine — Configuration
# ============================================================

embedding:
  # Primary model used via sentence-transformers (mirrors Vertex AI Embeddings)
  model: "all-MiniLM-L6-v2"        # alternatives: "bge-small-en-v1.5", "intfloat/e5-base-v2"
  batch_size: 32
  dimension: 384                    # all-MiniLM-L6-v2 dimension
  normalize: true                   # L2 normalise → cosine via inner product
  cache_backend: "sqlite"           # options: sqlite | pickle | json

chunking:
  chunk_size: 512                   # characters per chunk
  chunk_overlap: 64                 # overlap between consecutive chunks
  min_chunk_size: 50                # discard chunks smaller than this

retrieval:
  top_k: 5                          # default number of results
  similarity_metric: "cosine"       # cosine | euclidean | dot_product
  semantic_threshold: 0.25          # discard results below this score

vector_store:
  backend: "faiss"                  # faiss | numpy | chroma
  index_type: "flat_ip"             # flat_ip | flat_l2 | ivf_flat
  persist_path: "./data/indices"

query_expansion:
  enabled: true
  model: "gemini-3.1-pro-preview"   # mock — internally uses heuristic engine
  max_variants: 3
  expansion_type: "full"            # full | synonyms | technical | hyde

hybrid_search:
  enabled: true
  dense_weight: 0.7
  bm25_weight: 0.3

reranking:
  enabled: true
  model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_n_rerank: 10                  # rerank this many candidates → return top_k

benchmarking:
  metrics:
    - precision_at_k
    - recall_at_k
    - mrr
    - hit_rate
    - semantic_score
  k_values: [1, 3, 5]
  output_dir: "./outputs/benchmark_results"

logging:
  level: "INFO"
  format: "%(asctime)s | %(name)-30s | %(levelname)-8s | %(message)s"
  file: "./outputs/logs/retrieval.log"
